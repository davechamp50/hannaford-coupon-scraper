name: Clip Hannaford Coupons

on:
  schedule:
    # Runs daily at 8:00 AM UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  clip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Install Patchright browsers
        run: uv run patchright install chromium --with-deps

      - name: Clip coupons
        env:
          HANNAFORD_USERNAME: ${{ secrets.HANNAFORD_USERNAME }}
          HANNAFORD_PASSWORD: ${{ secrets.HANNAFORD_PASSWORD }}
          HEADLESS: "true"
        run: uv run python clip_coupons.py
